<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autodoc ENT | Feedback</title>

<style>
.logout-btn{
background:#f5f1e8;
color:#1e1a16;
padding:6px 16px;
border-radius:5px;
font-weight:bold;
margin-left:15px;
transition:0.3s;
text-decoration:none;
}

.logout-btn:hover{
background:#e2dbcf;
}

body{
margin:0;
font-family:Georgia, serif;
background:#1e1a16;
color:#f5f1e8;
overflow-x:hidden;
}

/* NAVBAR */

.reg{
position:fixed;
top:0;
width:100%;
background:#2a231c;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
z-index:1000;
box-sizing:border-box;
}

.logo-area{
display:flex;
align-items:center;
gap:20px;
}

.logo-area img{
height:65px;
}

.brand-text{
font-size:42px;
color:#f5f1e8;
white-space:nowrap;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
color:#f5f1e8;
text-decoration:none;
font-size:18px;
transition:0.3s;
}

.nav-links a:hover{
opacity:0.7;
}

/* HERO */

.feedback-hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding-top:120px;
background:
linear-gradient(rgba(30,26,22,0.85), rgba(30,26,22,0.85)),
url("https://images.unsplash.com/photo-1492724441997-5dc865305da7?auto=format&fit=crop&w=1920&q=80");
background-size:cover;
background-position:center;
}

/* FORM */

.form-card{
background:rgba(42,35,28,0.95);
padding:50px;
border-radius:18px;
width:500px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
transform:translateY(40px);
opacity:0;
transition:all 1s ease;
}

.form-card.active{
transform:translateY(0);
opacity:1;
}

.input-group{
position:relative;
margin-bottom:30px;
}

.input-group input,
.input-group textarea{
width:100%;
padding:15px;
background:#3a3027;
border:none;
border-radius:8px;
color:#f5f1e8;
}

.input-group label{
position:absolute;
top:14px;
left:15px;
color:#aaa;
transition:0.3s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label,
.input-group textarea:focus + label,
.input-group textarea:not(:placeholder-shown) + label{
top:-10px;
font-size:12px;
color:#fff;
background:#2a231c;
padding:2px 6px;
}

.submit-btn{
width:100%;
padding:15px;
background:#f5f1e8;
color:#1e1a16;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.success-screen{
display:none;
text-align:center;
font-size:28px;
}

.footer{
background:#2a231c;
text-align:center;
padding:40px;
}
</style>
</head>

<body>

<div class="reg">
<div class="logo-area">
<img src="/logo.png"> <!-- FIXED -->
<div class="brand-text">Autodoc ENT</div>
</div>

<div class="nav-links">
<a href="#" onclick="goHome()">Home</a>
<a href="/about.html">About</a>
<a href="/feedback.html">Feedback</a>
<a href="#" onclick="goRegister()">Register</a>
<a href="#" onclick="goLogin()">Login</a>
</div>
</div>

<div class="feedback-hero">

<div class="form-card" id="formCard">

<form id="feedbackForm">

<div class="input-group">
<input type="text" id="name" placeholder=" " required>
<label>Name</label>
</div>

<div class="input-group">
<input type="email" id="email" placeholder=" " required>
<label>Email</label>
</div>

<div class="input-group">
<textarea id="message" rows="5" placeholder=" " required></textarea>
<label>Your Feedback</label>
</div>

<button class="submit-btn">Submit Feedback</button>

</form>

<div class="success-screen" id="successScreen">
Thank you for your valuable feedback!
<br><br>
<a href="/about.html">Return to About</a>
</div>

</div>

</div>

<div class="footer">
© Autodoc | Designed by Madhav Tiwary
</div>

<script>

/* animation */
setTimeout(()=>document.getElementById("formCard").classList.add("active"),200);

/* form */
document.getElementById("feedbackForm").addEventListener("submit", function(e){
e.preventDefault();

this.style.display="none";
document.getElementById("successScreen").style.display="block";
});

/* navigation fixes */

function goHome(){ window.location.href="/"; }
function goLogin(){ window.location.href="/login"; }
function goRegister(){ window.location.href="/register"; }

</script>

</body>
</html>
